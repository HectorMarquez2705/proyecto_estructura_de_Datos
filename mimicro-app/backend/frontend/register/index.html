<!DOCTYPE html>
<html lang="es">
<script>document.documentElement.dataset.theme=localStorage.getItem('mimicro_theme')||'dark'</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>miMicro — Registro</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/global.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">

  <div class="login-orb login-orb-1"></div>
  <div class="login-orb login-orb-2"></div>

  <button class="login-theme-btn" onclick="toggleTheme()" title="Cambiar tema">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <div class="login-card anim-fade" style="max-width:440px;">

    <div class="login-logo-wrap">
      <div class="login-logo-icon">🚌</div>
    </div>
    <h1 class="login-title">Crear cuenta</h1>
    <p class="login-sub">Unite a la plataforma de transporte inteligente</p>

    <!-- Selector de rol -->
    <div class="reg-role-selector" id="role-selector">
      <button class="reg-role-btn active" data-rol="pasajero" type="button">
        <span class="reg-role-icon">🧑</span>
        <span class="reg-role-label">Pasajero</span>
      </button>
      <button class="reg-role-btn" data-rol="chofer" type="button">
        <span class="reg-role-icon">🚌</span>
        <span class="reg-role-label">Chofer</span>
      </button>
    </div>

    <div class="auth-error" id="auth-error"></div>

    <form id="register-form" novalidate>
      <input type="hidden" id="rol" value="pasajero">

      <div class="login-field">
        <label class="login-label" for="nombre">Nombre completo</label>
        <div class="login-input-wrap">
          <svg class="login-input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input class="login-input" type="text" id="nombre" placeholder="Juan Pérez" required autocomplete="name">
        </div>
      </div>

      <div class="login-field">
        <label class="login-label" for="email">Correo electrónico</label>
        <div class="login-input-wrap">
          <svg class="login-input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input class="login-input" type="email" id="email" placeholder="usuario@ejemplo.com" required autocomplete="email">
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="login-field" style="margin-bottom:0;">
          <label class="login-label" for="password">Contraseña</label>
          <div class="login-input-wrap">
            <svg class="login-input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input class="login-input" type="password" id="password" placeholder="Mín. 6 caracteres" required autocomplete="new-password">
          </div>
        </div>
        <div class="login-field" style="margin-bottom:0;">
          <label class="login-label" for="telefono">Teléfono <span style="font-weight:400;color:var(--text-3)">(opc.)</span></label>
          <div class="login-input-wrap">
            <svg class="login-input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.38 2 2 0 0 1 3.59 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.53a16 16 0 0 0 6.29 6.29l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            <input class="login-input" type="tel" id="telefono" placeholder="+591 70000000" autocomplete="tel">
          </div>
        </div>
      </div>

      <div class="form-error show" id="err-general" style="display:none;margin-top:10px;"></div>

      <button class="btn-gradient" type="submit" id="btn-register" style="margin-top:20px;">
        Crear mi cuenta
      </button>
    </form>

    <div class="login-footer">
      ¿Ya tenés cuenta? <a href="/login/">Iniciá sesión</a>
    </div>

  </div>

  <div class="toast-container" id="toast-container"></div>
  <script src="/static/shared/auth.js"></script>
  <script src="/static/shared/api.js"></script>
  <script src="script.js"></script>
</body>
</html>
