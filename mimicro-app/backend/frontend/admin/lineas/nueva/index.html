<!DOCTYPE html>
<html lang="es">
<script>document.documentElement.dataset.theme = localStorage.getItem('mimicro_theme') || 'light';</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miMicro — Nueva Línea</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/global.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="role-admin">

<div id="app-shell"></div>
<div class="main-wrap">
  <div id="topbar-mount"></div>
  <main class="main-content">

    <div class="page-header">
      <div class="page-header-left">
        <a href="/admin/lineas/" class="btn btn-ghost btn-sm">← Volver</a>
        <h2 class="page-title">Nueva Línea de Micro</h2>
      </div>
    </div>

    <div class="nueva-linea-layout">

      <!-- Columna izquierda: formulario -->
      <div class="form-col">
        <div class="card">
          <h3 class="section-title">Datos de la línea</h3>
          <form id="form-linea" onsubmit="guardarLinea(event)">
            <div class="form-group">
              <label class="form-label">Número / Nombre *</label>
              <input id="l-nombre" class="input" required placeholder="Ej: 79, Urbana Norte, Troncal 4">
              <span class="form-hint">Identificador único de la línea</span>
            </div>
            <div class="form-group">
              <label class="form-label">Descripción</label>
              <textarea id="l-desc" class="input textarea" rows="3"
                placeholder="Ej: Recorre todo el Cuarto Anillo desde el norte hasta el sur"></textarea>
            </div>

            <hr class="form-divider">

            <h3 class="section-title">Ruta en el mapa</h3>
            <p class="form-hint map-hint">
              Hacé clic en el mapa para agregar puntos a la ruta. Los puntos se conectan en el orden en que los agregás.
            </p>

            <div class="map-toolbar">
              <span id="puntos-count" class="puntos-count">0 puntos</span>
              <button type="button" class="btn btn-sm btn-ghost" onclick="deshacerUltimoPunto()">
                ↩ Deshacer último
              </button>
              <button type="button" class="btn btn-sm btn-ghost btn-danger-ghost" onclick="limpiarRuta()">
                🗑 Limpiar todo
              </button>
            </div>

            <div id="map-nueva" class="map-nueva"></div>

            <div class="form-actions">
              <a href="/admin/lineas/" class="btn btn-ghost">Cancelar</a>
              <button type="submit" id="btn-guardar" class="btn btn-primary">Guardar Línea</button>
            </div>
          </form>
        </div>
      </div>

    </div>

  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/shared/auth.js"></script>
<script src="/static/shared/api.js"></script>
<script src="/static/shared/socket.js"></script>
<script src="/static/shared/layout.js"></script>
<script src="script.js"></script>
</body>
</html>
