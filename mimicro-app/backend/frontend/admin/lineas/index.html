<!DOCTYPE html>
<html lang="es">
<script>document.documentElement.dataset.theme = localStorage.getItem('mimicro_theme') || 'light';</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miMicro — Líneas de Micro</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/global.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="role-admin">

<div id="app-shell"></div>
<div class="main-wrap">
  <div id="topbar-mount"></div>
  <main class="main-content">

    <div class="page-header">
      <h2 class="page-title">Líneas de Micro</h2>
      <a href="/admin/lineas/nueva/" class="btn btn-primary">+ Nueva Línea</a>
    </div>

    <div id="lineas-grid" class="lineas-grid">
      <div class="linea-card skeleton-card"><div class="skeleton-line"></div></div>
      <div class="linea-card skeleton-card"><div class="skeleton-line"></div></div>
      <div class="linea-card skeleton-card"><div class="skeleton-line"></div></div>
    </div>

    <div id="empty-state" class="empty-state" style="display:none;">
      <div class="empty-icon">🚌</div>
      <div class="empty-title">No hay líneas registradas</div>
      <div class="empty-sub">Creá la primera línea con el botón "+ Nueva Línea"</div>
    </div>

  </main>
</div>

<script src="/static/shared/auth.js"></script>
<script src="/static/shared/api.js"></script>
<script src="/static/shared/socket.js"></script>
<script src="/static/shared/layout.js"></script>
<script src="script.js"></script>
</body>
</html>
