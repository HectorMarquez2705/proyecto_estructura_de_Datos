<!DOCTYPE html>
<html lang="es">
<script>document.documentElement.dataset.theme = localStorage.getItem('mimicro_theme') || 'light';</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miMicro — Usuarios</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/global.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="role-admin">

<div id="app-shell"></div>
<div class="main-wrap">
  <div id="topbar-mount"></div>
  <main class="main-content">

    <div class="page-header">
      <h2 class="page-title">Gestión de Usuarios</h2>
      <div class="search-bar">
        <input id="search" type="search" class="input search-input" placeholder="Buscar por nombre o email…">
        <span id="search-count" class="search-count"></span>
      </div>
    </div>

    <div class="card table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>Usuario</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Registro</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="tabla-body">
          <tr><td colspan="5" class="skeleton-cell"><div class="skeleton-line"></div></td></tr>
          <tr><td colspan="5" class="skeleton-cell"><div class="skeleton-line"></div></td></tr>
          <tr><td colspan="5" class="skeleton-cell"><div class="skeleton-line"></div></td></tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script src="/static/shared/auth.js"></script>
<script src="/static/shared/api.js"></script>
<script src="/static/shared/socket.js"></script>
<script src="/static/shared/layout.js"></script>
<script src="script.js"></script>
</body>
</html>
