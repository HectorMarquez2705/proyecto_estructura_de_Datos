<!DOCTYPE html>
<html lang="es">
<script>document.documentElement.dataset.theme = localStorage.getItem('mimicro_theme') || 'light';</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miMicro — Reportes</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/global.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="role-admin">

<div id="app-shell"></div>
<div class="main-wrap">
  <div id="topbar-mount"></div>
  <main class="main-content">

    <div class="page-header">
      <h2 class="page-title">Dashboard</h2>
      <button class="btn btn-ghost btn-sm" onclick="cargarReportes()">↺ Actualizar</button>
    </div>

    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi-card kpi-blue">
        <div class="kpi-lbl">Usuarios registrados</div>
        <div class="kpi-val" id="stat-usuarios">…</div>
        <div class="kpi-delta">👤 Total en el sistema</div>
      </div>
      <div class="kpi-card kpi-green">
        <div class="kpi-lbl">Micros activos ahora</div>
        <div class="kpi-val" id="stat-activos">…</div>
        <div class="kpi-delta">🟢 En servicio</div>
      </div>
      <div class="kpi-card kpi-amber">
        <div class="kpi-lbl">Total de micros</div>
        <div class="kpi-val" id="stat-micros">…</div>
        <div class="kpi-delta">🚌 Flota completa</div>
      </div>
      <div class="kpi-card kpi-red">
        <div class="kpi-lbl">Líneas de micro</div>
        <div class="kpi-val" id="stat-rutas">…</div>
        <div class="kpi-delta">🗺️ Configuradas</div>
      </div>
    </div>

    <div class="section-header">
      <h3>🔒 Registro de Seguridad <span class="section-sub">Últimas 50 entradas</span></h3>
    </div>

    <div class="card table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>Acción</th>
            <th>Usuario / IP</th>
            <th>Fecha y Hora</th>
          </tr>
        </thead>
        <tbody id="log-body">
          <tr><td colspan="3" class="skeleton-cell"><div class="skeleton-line"></div></td></tr>
          <tr><td colspan="3" class="skeleton-cell"><div class="skeleton-line"></div></td></tr>
          <tr><td colspan="3" class="skeleton-cell"><div class="skeleton-line"></div></td></tr>
          <tr><td colspan="3" class="skeleton-cell"><div class="skeleton-line"></div></td></tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script src="/static/shared/auth.js"></script>
<script src="/static/shared/api.js"></script>
<script src="/static/shared/socket.js"></script>
<script src="/static/shared/layout.js"></script>
<script src="script.js"></script>
</body>
</html>
