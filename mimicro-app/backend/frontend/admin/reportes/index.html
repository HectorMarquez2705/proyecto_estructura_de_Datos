<!DOCTYPE html>
<html lang="es">
<script>document.documentElement.dataset.theme = localStorage.getItem('mimicro_theme') || 'light';</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miMicro — Reportes</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/global.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="role-admin">

<div id="app-shell"></div>
<div class="main-wrap">
  <div id="topbar-mount"></div>
  <main class="main-content">

    <div class="page-header">
      <h2 class="page-title">Reportes del Sistema</h2>
      <button class="btn btn-ghost" onclick="cargarReportes()">↺ Actualizar</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👤</div>
        <div class="stat-value" id="stat-usuarios">…</div>
        <div class="stat-label">Usuarios Registrados</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🗺️</div>
        <div class="stat-value" id="stat-rutas">…</div>
        <div class="stat-label">Rutas Activas</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🚌</div>
        <div class="stat-value" id="stat-micros">…</div>
        <div class="stat-label">Total de Micros</div>
      </div>
      <div class="stat-card stat-card-highlight">
        <div class="stat-icon">✅</div>
        <div class="stat-value" id="stat-activos">…</div>
        <div class="stat-label">Micros Activos</div>
      </div>
    </div>

    <div class="section-header">
      <h3>🔒 Registro de Seguridad <span class="section-sub">Últimas 50 entradas</span></h3>
    </div>

    <div class="card table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>Acción</th>
            <th>Usuario / IP</th>
            <th>Fecha y Hora</th>
          </tr>
        </thead>
        <tbody id="log-body">
          <tr><td colspan="3" class="skeleton-cell"><div class="skeleton-line"></div></td></tr>
          <tr><td colspan="3" class="skeleton-cell"><div class="skeleton-line"></div></td></tr>
          <tr><td colspan="3" class="skeleton-cell"><div class="skeleton-line"></div></td></tr>
          <tr><td colspan="3" class="skeleton-cell"><div class="skeleton-line"></div></td></tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script src="/static/shared/auth.js"></script>
<script src="/static/shared/api.js"></script>
<script src="/static/shared/socket.js"></script>
<script src="/static/shared/layout.js"></script>
<script src="script.js"></script>
</body>
</html>
