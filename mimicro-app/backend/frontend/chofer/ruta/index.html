<!DOCTYPE html>
<html lang="es">
<script>document.documentElement.dataset.theme = localStorage.getItem('mimicro_theme') || 'dark';</script>
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miMicro — Ruta Activa</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/global.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="role-chofer">

<div id="app-shell"></div>
<div class="main-wrap">
  <div id="topbar-mount"></div>
  <main class="main-content" style="padding:0;">

    <!-- Sin micro asignado -->
    <div id="no-micro-msg" style="display:none;padding:40px 20px;">
      <div class="empty-state">
        <div class="empty-icon">🚌</div>
        <div class="empty-title">Sin micro asignado</div>
        <div class="empty-sub">No tenés ningún micro asignado. Contactá al administrador.</div>
      </div>
    </div>

    <!-- Contenido principal -->
    <div id="chofer-content" class="chofer-mobile" style="display:none;">

      <!-- Indicador de estado -->
      <div class="chofer-status-bar">
        <div class="gps-indicator gps-inactive" id="gps-indicator">
          <div class="gps-dot"></div>
          <span id="gps-label">GPS inactivo</span>
        </div>
        <div style="flex:1;"></div>
        <span id="micro-placa-badge" class="badge badge-blue" style="font-size:13px;"></span>
      </div>

      <!-- Mapa -->
      <div style="margin:0 -0px;position:relative;">
        <div id="chofer-mapa" style="height:240px;border-radius:16px;overflow:hidden;border:1px solid var(--border);"></div>
      </div>

      <!-- Progreso de ruta -->
      <div class="chofer-progress-card">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:14px;font-weight:700;color:var(--text);" id="info-ruta-nombre">—</span>
          <span style="font-size:13px;color:var(--text-2);" id="info-cap-badge">— pasajeros</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="ruta-progress" style="width:0%"></div>
        </div>
        <div style="display:flex;justify-content:space-between;">
          <span style="font-size:12px;color:var(--text-3);">GPS: <span id="gps-lat">—</span>, <span id="gps-lng">—</span></span>
          <span style="font-size:12px;color:var(--text-3);" id="gps-vel">— km/h</span>
        </div>
      </div>

      <!-- Ocupación rápida -->
      <div class="mobile-card">
        <div style="font-size:13px;font-weight:700;color:var(--text-2);margin-bottom:10px;">Estado de ocupación</div>
        <div class="ocup-selector">
          <button class="ocup-btn" data-ocup="vacio"  onclick="setOcupacion('vacio',  this)">😊<br>Vacío</button>
          <button class="ocup-btn" data-ocup="medio"  onclick="setOcupacion('medio',  this)">😐<br>Medio</button>
          <button class="ocup-btn active-lleno" data-ocup="lleno" onclick="setOcupacion('lleno', this)">😤<br>Lleno</button>
        </div>
      </div>

      <!-- Acciones rápidas -->
      <div class="mobile-card">
        <div style="font-size:13px;font-weight:700;color:var(--text-2);margin-bottom:10px;">Acciones rápidas</div>
        <div class="quick-actions">
          <button class="quick-btn" id="btn-toggle-ruta" onclick="toggleRuta()"
            style="background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;">
            ▶️ Iniciar ruta
          </button>
          <a href="/chofer/desvio/" class="quick-btn" style="background:rgba(245,158,11,.15);color:#f59e0b;text-decoration:none;display:flex;align-items:center;justify-content:center;">
            ⚠️ Desvío
          </a>
          <a href="/chofer/ocupacion/" class="quick-btn" style="background:rgba(37,99,235,.15);color:#60a5fa;text-decoration:none;display:flex;align-items:center;justify-content:center;">
            👥 Ocupación
          </a>
        </div>
      </div>

      <!-- Info del micro -->
      <div class="mobile-card">
        <div style="font-size:13px;font-weight:700;color:var(--text-2);margin-bottom:10px;">Info del micro</div>
        <div class="gps-row"><span class="gps-row-label">Placa</span>    <span class="gps-row-val" id="info-placa">—</span></div>
        <div class="gps-row"><span class="gps-row-label">Modelo</span>   <span class="gps-row-val" id="info-ruta">—</span></div>
        <div class="gps-row"><span class="gps-row-label">Capacidad</span><span class="gps-row-val" id="info-cap">—</span></div>
        <div class="gps-row" style="border:none;"><span class="gps-row-label">Estado</span><span class="gps-row-val" id="info-estado">—</span></div>
      </div>

    </div><!-- /chofer-mobile -->

  </main>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/shared/auth.js"></script>
<script src="/static/shared/api.js"></script>
<script src="/static/shared/socket.js"></script>
<script src="/static/shared/layout.js"></script>
<script src="script.js"></script>
</body>
</html>
