<!DOCTYPE html>
<html lang="es">
<script>document.documentElement.dataset.theme = localStorage.getItem('mimicro_theme') || 'dark';</script>
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miMicro — Reportar Desvío</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/global.css">
</head>
<body class="role-chofer">

<div id="app-shell"></div>
<div class="main-wrap">
  <div id="topbar-mount"></div>
  <main class="main-content" style="padding:8px 16px 16px;">

    <h2 class="page-title" style="margin:0 0 16px;font-size:18px;">Reportar desvío</h2>

    <div class="mobile-card">
      <form id="desvio-form" novalidate>
        <div class="form-group">
          <label class="form-label">Ruta afectada</label>
          <select class="form-select" id="sel-ruta">
            <option value="">Cargando rutas…</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label">Descripción del desvío o incidente</label>
          <textarea class="form-textarea" id="descripcion" rows="5"
            placeholder="Ej: Desvío por Av. Roca y Coronado por obras viales…"></textarea>
          <span class="form-hint">Sé específico para que los pasajeros puedan planificar su viaje.</span>
        </div>

        <div id="success-msg" class="mobile-card" style="display:none;background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);margin-bottom:14px;">
          <span style="color:#22c55e;font-weight:600;">✅ Alerta enviada exitosamente a los pasajeros.</span>
        </div>

        <button class="btn-gradient" type="submit" id="btn-enviar" style="background:linear-gradient(135deg,#ef4444,#dc2626);">
          🚨 Enviar alerta a pasajeros
        </button>
      </form>
    </div>

  </main>
</div>

<script src="/static/shared/auth.js"></script>
<script src="/static/shared/api.js"></script>
<script src="/static/shared/layout.js"></script>
<script src="script.js"></script>
</body>
</html>
