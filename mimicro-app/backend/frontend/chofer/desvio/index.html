<!DOCTYPE html>
<html lang="es">
<script>document.documentElement.dataset.theme = localStorage.getItem('mimicro_theme') || 'light';</script>
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miMicro — Reportar Desvío</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/global.css">
</head>
<body class="role-chofer">

<div id="app-shell"></div>
<div class="main-wrap">
  <div id="topbar-mount"></div>
  <main class="main-content" style="max-width:600px;margin:0 auto;">

    <div class="page-header">
      <div><h1 class="page-title">Reportar desvío o incidente</h1><p class="page-sub">Se enviará una alerta a todos los pasajeros recientes de la ruta</p></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">⚠️ Nueva alerta</span></div>
      <form id="desvio-form" novalidate>
        <div class="form-group">
          <label class="form-label">Ruta afectada</label>
          <select class="form-select" id="sel-ruta">
            <option value="">Cargando rutas…</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Descripción del desvío o incidente</label>
          <textarea class="form-textarea" id="descripcion" rows="5" placeholder="Ej: Desvío por Av. Roca y Coronado por obras viales. Se tomará la ruta alterna por el 4to Anillo..."></textarea>
          <span class="form-hint">Sé específico para que los pasajeros puedan planificar su viaje.</span>
        </div>
        <div id="success-msg" style="display:none;" class="card" style="background:var(--green-light);border-color:var(--green);padding:14px;margin-bottom:16px;">
          <span style="color:var(--green);font-weight:600;">✅ Alerta enviada exitosamente a los pasajeros.</span>
        </div>
        <button class="btn btn-danger btn-lg" type="submit" id="btn-enviar" style="width:100%;">
          🚨 Enviar alerta a pasajeros
        </button>
      </form>
    </div>

  </main>
</div>

<script src="/static/shared/auth.js"></script>
<script src="/static/shared/api.js"></script>
<script src="/static/shared/layout.js"></script>
<script src="script.js"></script>
</body>
</html>
