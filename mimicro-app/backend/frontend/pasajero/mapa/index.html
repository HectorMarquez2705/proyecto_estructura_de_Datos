<!DOCTYPE html>
<html lang="es">
<script>document.documentElement.dataset.theme = localStorage.getItem('mimicro_theme') || 'dark';</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miMicro — Mapa</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/global.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="role-pasajero">

<div id="app-shell"></div>
<div class="main-wrap">
  <div id="topbar-mount"></div>
  <main class="main-content mapa-main">

    <div class="planner-wrap">

      <!-- ── Panel izquierdo ─────────────────────────────────── -->
      <div class="planner-panel" id="planner-panel">

        <h3 class="panel-title">Planificar viaje</h3>

        <!-- Origen -->
        <div class="pin-row">
          <div class="pin-dot pin-dot-origin"></div>
          <div class="pin-field">
            <label class="pin-label">Desde</label>
            <div class="pin-input-row">
              <input id="input-origen" class="pin-input" readonly
                     placeholder="Detectando tu ubicación…">
              <button id="btn-gps" class="btn btn-sm btn-ghost pin-btn" title="Usar GPS">📍</button>
            </div>
          </div>
        </div>

        <div class="pin-connector"></div>

        <!-- Destino -->
        <div class="pin-row">
          <div class="pin-dot pin-dot-dest"></div>
          <div class="pin-field">
            <label class="pin-label">Hasta</label>
            <div class="pin-input-row">
              <input id="input-destino" class="pin-input" readonly
                     placeholder="Tocá el mapa para fijar">
              <button id="btn-clear-dest" class="btn btn-sm btn-ghost pin-btn"
                      style="display:none" title="Borrar destino">×</button>
            </div>
          </div>
        </div>

        <!-- Botones de modo pin -->
        <div class="pin-mode-row">
          <button id="btn-modo-origen"  class="btn btn-sm btn-outline">📌 Cambiar origen</button>
          <button id="btn-modo-destino" class="btn btn-sm btn-outline">📌 Fijar destino</button>
        </div>

        <!-- Hint de modo pin -->
        <div id="pin-hint" class="pin-hint" style="display:none">
          Hacé clic en el mapa para fijar el punto
        </div>

        <!-- Calcular -->
        <button id="btn-calcular" class="btn btn-primary btn-block" disabled>
          Calcular ruta óptima
        </button>

        <!-- Resultado encontrado -->
        <div id="result-section" style="display:none">
          <div class="result-header">
            <span class="result-tiempo" id="result-tiempo"></span>
            <span class="result-label">tiempo estimado</span>
          </div>
          <div id="tramos-list" class="tramos-list"></div>
        </div>

        <!-- Sin ruta -->
        <div id="no-ruta-section" class="no-ruta" style="display:none">
          <div class="no-ruta-icon">🗺️</div>
          <div class="no-ruta-title">Sin ruta disponible</div>
          <p class="no-ruta-sub">No hay conexión entre estos puntos con las líneas actuales. Intentá mover el origen o el destino.</p>
        </div>

      </div><!-- /planner-panel -->

      <!-- ── Mapa ──────────────────────────────────────────────── -->
      <div id="mapa-container"></div>

    </div><!-- /planner-wrap -->

  </main>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/shared/auth.js"></script>
<script src="/static/shared/api.js"></script>
<script src="/static/shared/socket.js"></script>
<script src="/static/shared/layout.js"></script>
<script src="script.js"></script>
<script>
/* ── Renderizado de ruta ─────────────────────────────────────────────
   Overrides drawRuta() definida en script.js con la siguiente estrategia:
     · caminar → OSRM routed-foot (ruta peatonal real por las calles)
     · micro   → OSRM routed-car pasando por los waypoints de ruta_segmento
   ─────────────────────────────────────────────────────────────────── */

/* OSRM foot entre dos puntos. Devuelve [[lat,lng],...]. */
async function fetchOSRMRoute(desde, hasta) {
  const url = `https://routing.openstreetmap.de/routed-foot/route/v1/foot/` +
              `${desde.lng},${desde.lat};${hasta.lng},${hasta.lat}` +
              `?overview=full&geometries=geojson&alternatives=true`;
  try {
    const res  = await fetch(url);
    const json = await res.json();
    if (json.code !== 'Ok' || !json.routes?.length) throw new Error(json.code);
    const best = json.routes.reduce((a, b) => a.distance <= b.distance ? a : b);
    return best.geometry.coordinates.map(([lng, lat]) => [lat, lng]);
  } catch (e) {
    console.warn('[OSRM foot] falló:', e.message);
    return [[desde.lat, desde.lng], [hasta.lat, hasta.lng]];
  }
}

/* OSRM car pasando por todos los waypoints del segmento. Devuelve [[lat,lng],...]. */
async function fetchOSRMCarRoute(waypoints) {
  const coords = waypoints.map(p => `${p.lng},${p.lat}`).join(';');
  const url = `https://routing.openstreetmap.de/routed-car/route/v1/driving/${coords}` +
              `?overview=full&geometries=geojson`;
  try {
    const res  = await fetch(url);
    const json = await res.json();
    if (json.code !== 'Ok' || !json.routes?.length) throw new Error(json.code);
    return json.routes[0].geometry.coordinates.map(([lng, lat]) => [lat, lng]);
  } catch (e) {
    console.warn('[OSRM car] falló:', e.message);
    return waypoints.map(p => [p.lat, p.lng]);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const COLORS = ['#2563EB', '#7c3aed', '#db2777', '#d97706', '#059669'];

  window.drawRuta = async function (tramos) {

    /* ── Pase 1: resolver geometría de cada tramo en paralelo ── */
    const routes = await Promise.all(tramos.map(t => {
      if (t.tipo === 'caminar' && t.distancia_m >= 1) {
        /* Caminata: OSRM foot para seguir las calles reales */
        return fetchOSRMRoute(
          { lat: t.desde_lat, lng: t.desde_lng },
          { lat: t.hasta_lat, lng: t.hasta_lng }
        );
      }
      if (t.tipo === 'micro' && (t.ruta_segmento || []).length) {
        /* Micro: OSRM car pasando por los waypoints del admin */
        return fetchOSRMCarRoute(t.ruta_segmento);
      }
      return Promise.resolve(null);
    }));

    /* ── Pase 2: dibujar ── */
    let colorIdx = 0;
    const bounds = [];
    if (origenLat)  bounds.push([origenLat,  origenLng]);
    if (destinoLat) bounds.push([destinoLat, destinoLng]);

    for (let i = 0; i < tramos.length; i++) {
      const t      = tramos[i];
      const coords = routes[i];
      if (!coords?.length) continue;

      /* ── Tramo a pie — ruta peatonal real (OSRM foot) ── */
      if (t.tipo === 'caminar') {
        const pl = L.polyline(coords, {
          color: '#6b7280', weight: 3, opacity: 0.7, dashArray: '7 7',
        }).addTo(map);
        rutaLayers.push(pl);
        bounds.push(...coords);

      /* ── Tramo en micro — OSRM car por waypoints del admin ── */
      } else if (t.tipo === 'micro') {
        const color = COLORS[colorIdx++ % COLORS.length];
        const pl    = L.polyline(coords, { color, weight: 5, opacity: 0.85 }).addTo(map);
        rutaLayers.push(pl);
        bounds.push(...coords);

        [{ ll: coords[0], label: 'Subida' },
         { ll: coords[coords.length - 1], label: 'Bajada' }]
          .forEach(({ ll, label }) => {
            const cm = L.circleMarker(ll, {
              radius: 7, color: '#fff', fillColor: color, fillOpacity: 1, weight: 2.5,
            }).addTo(map)
              .bindPopup(`<strong>${label}: ${escapeHtml(t.linea_nombre || String(t.linea_id))}</strong>`);
            rutaLayers.push(cm);
          });

        if (t.micro_cercano) {
          const mc  = t.micro_cercano;
          const mid = String(mc.micro_id);
          if (!microMarkers[mid]) {
            microMarkers[mid] = L.marker([mc.lat, mc.lng], { icon: iconMicro })
              .addTo(map)
              .bindPopup(`🚌 Micro activo<br>A ${Math.round(mc.distancia_m)} m<br>ETA: ~${Math.round(mc.eta_seg / 60)} min`);
            bounds.push([mc.lat, mc.lng]);
          }
        }
      }
    }

    if (bounds.length > 1) map.fitBounds(bounds, { padding: [60, 40] });
  };
});
</script>
</body>
</html>
