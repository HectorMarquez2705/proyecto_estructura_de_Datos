<!DOCTYPE html>
<html lang="es">
<script>document.documentElement.dataset.theme = localStorage.getItem('mimicro_theme') || 'light';</script>
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miMicro — Notificaciones</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/global.css">
</head>
<body class="role-pasajero">

<div id="app-shell"></div>
<div class="main-wrap">
  <div id="topbar-mount"></div>
  <main class="main-content">

    <div class="page-header">
      <div>
        <h1 class="page-title">Centro de notificaciones</h1>
        <p class="page-sub">Alertas de desvíos, retrasos y comunicados del sistema</p>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="badge badge-red" id="badge-noLeidas" style="display:none;"></span>
        <button class="btn btn-secondary btn-sm" id="btn-todas" style="display:none;" onclick="marcarTodas()">✓ Marcar todas leídas</button>
      </div>
    </div>
    <div id="notif-list">
      <div class="loading-state"><div class="spinner"></div><span>Cargando notificaciones…</span></div>
    </div>

  </main>
</div>

<script src="/static/shared/auth.js"></script>
<script src="/static/shared/api.js"></script>
<script src="/static/shared/layout.js"></script>
<script src="script.js"></script>
</body>
</html>
