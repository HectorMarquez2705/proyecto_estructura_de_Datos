<!DOCTYPE html>
<html lang="es">
<script>document.documentElement.dataset.theme = localStorage.getItem('mimicro_theme') || 'dark';</script>
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miMicro — Historial</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/global.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="role-pasajero">

<div id="app-shell"></div>
<div class="main-wrap">
  <div id="topbar-mount"></div>
  <main class="main-content" style="padding:0 16px 16px;">

    <!-- Banner de estadísticas -->
    <div class="hist-banner" id="hist-banner" style="display:none;">
      <div class="hist-banner-stat">
        <div class="hist-banner-val" id="stat-viajes">0</div>
        <div class="hist-banner-lbl">Viajes</div>
      </div>
      <div class="hist-banner-div"></div>
      <div class="hist-banner-stat">
        <div class="hist-banner-val" id="stat-bs">0</div>
        <div class="hist-banner-lbl">Bs gastados</div>
      </div>
      <div class="hist-banner-div"></div>
      <div class="hist-banner-stat">
        <div class="hist-banner-val" id="stat-rutas">0</div>
        <div class="hist-banner-lbl">Rutas distintas</div>
      </div>
    </div>

    <h2 class="page-title" style="margin:0 0 12px;font-size:18px;">Mis viajes</h2>
    <div id="historial-list">
      <div class="loading-state"><div class="spinner"></div><span>Cargando historial…</span></div>
    </div>

  </main>
</div>

<script src="/static/shared/auth.js"></script>
<script src="/static/shared/api.js"></script>
<script src="/static/shared/layout.js"></script>
<script src="script.js"></script>
</body>
</html>
