<!DOCTYPE html>
<html lang="es">
<script>document.documentElement.dataset.theme=localStorage.getItem('mimicro_theme')||'dark'</script>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>miMicro — Iniciar sesión</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/global.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">

  <div class="login-page">

    <!-- Orbs decorativos -->
    <div class="login-orb login-orb-1"></div>
    <div class="login-orb login-orb-2"></div>

    <!-- Botón de tema -->
    <button class="login-theme-btn" onclick="toggleTheme()" title="Cambiar tema">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>

    <div class="login-card anim-fade">

      <!-- Logo -->
      <div class="login-logo-wrap">
        <div class="login-logo-icon">🚌</div>
      </div>
      <h1 class="login-title">Bienvenido de vuelta</h1>
      <p class="login-sub">Iniciá sesión para continuar</p>

      <!-- Error -->
      <div class="auth-error" id="auth-error"></div>

      <form id="login-form" novalidate>

        <!-- Email -->
        <div class="login-field">
          <label class="login-label" for="email">Correo electrónico</label>
          <div class="login-input-wrap">
            <svg class="login-input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input class="login-input" type="email" id="email"
                   placeholder="usuario@ejemplo.com" required autocomplete="email">
          </div>
          <span class="login-error" id="err-email">Ingresá un correo válido</span>
        </div>

        <!-- Password -->
        <div class="login-field">
          <label class="login-label" for="password">Contraseña</label>
          <div class="login-input-wrap">
            <svg class="login-input-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input class="login-input" type="password" id="password"
                   placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="login-eye-btn" onclick="togglePasswordVisibility('password', this)">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="login-error" id="err-password">La contraseña es obligatoria</span>
        </div>

        <button class="btn-gradient" type="submit" id="btn-login">
          Iniciar sesión
        </button>

      </form>

      <div class="login-footer">
        ¿No tenés cuenta? <a href="/register/">Registrate aquí</a>
      </div>

    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script src="/static/shared/auth.js"></script>
  <script src="/static/shared/api.js"></script>
  <script src="script.js"></script>
  <script>
    function togglePasswordVisibility(id, btn) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
